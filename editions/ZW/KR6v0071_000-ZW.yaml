body:
  text: 金剛五禮整理者達照題解金剛五禮又名金剛五禮文金光五禮金光五禮讚等中國僧人所撰禮懺文作者姚和尚一卷未為歷代大藏經所收亦未為歷代經錄所著錄在敦煌遺書中至今已經發現了十八種金剛五禮的寫本根據對三身佛的不同說法可分為兩種異本諸本中北敦號的書品較佳文字錯誤之處也最少北敦號末後兩段次序顛倒斯號尾缺北敦號首缺其餘諸號均首尾完整關於金剛五禮的作者在伯號中標有姚和上金剛五禮字樣可見應為某俗姓為姚的和尚所撰汪娟博士認為該姚和尚可能是吐蕃統治時期敦煌金光明寺僧人姚利濟見敦煌禮懺文研究法鼓文化事業股份有限公司年月初版第頁可備一說但因缺乏詳細的考証故還有待進一步的研究本禮懺文共分五個儀節故名五禮第一禮是對法身佛的讚禮第二禮是對報身佛的讚禮第三禮是對化身佛的讚禮第四禮是對金剛經的讚禮第五禮是對佛說金剛經這件事以及說金剛經處所的讚禮本文獻較為特異的是稱釋迦牟尼既是化身佛又是法身佛與報身佛與傳統認為釋迦牟尼僅為化身佛不同按照傳統的佛教理論佛的化身是無量無邊的所以對釋迦牟尼佛的所有化身佛都可以稱其為同名釋迦牟尼佛但是對法身和報身也稱為釋迦牟尼佛這就顯得比較特殊並值得研究但在現存的敦煌遺書十八個寫本中只有伯號俄號背面是把三身佛分別說成毗盧遮那佛盧舍那佛和釋迦牟尼佛其餘十六個本子均將三身佛寫成釋迦牟尼佛或同名釋迦牟尼佛由於伯號俄號背面這兩號的書品極差而其餘諸號相對來說書品較佳抄寫亦基本一致故其餘諸號抄寫錯誤的可能性幾乎不存在所以我們應該承認古代確有將釋迦牟尼作為三身佛的說法我們知道在南宋四川綿竹大中祥符寺僧人思覺集的如來廣孝十種報恩道場儀將載藏外佛教文獻第八輯中也出現了法報化身釋迦文佛的說法聯繫金剛五禮的有關記敘說明在唐朝已經流傳著釋迦牟尼佛就是三身佛的說法並以同名釋迦牟尼佛這樣的形式表述之說明三身即一佛的觀點最遲在唐代已經形成看來象伯號俄號那樣將三身釋伽牟尼改為傳統的表述是後人的再創造鑒於此我們把伯號俄號背面作為異本來處理以期反映該文獻的不同演化階段金剛五禮是以金剛經為指導思想的一種佛教懺儀依金剛經而作的懺儀除此之外還有梁武帝的金剛般若懺文遼代通理大師所作的金剛禮現流傳于南方不明作者的慈悲金剛寶懺等都是以金剛經作為造懺的根本依典的金剛經屬般若經系統是大乘破除妄執的代表經典闡述無相的中觀理論佛教的懺悔法分理懺和事懺理懺是一種無相懺如說罪性本空由心造心若滅時罪亦亡心亡罪滅兩俱空是則名為真懺悔見瑜伽燄口惠能壇經把無相懺表達得淋漓盡致而六祖慧能大師據說又是聽聞金剛經而開悟的壇經中的無相懺與金剛經有無必然的聯繫姑且不論但其義理的相通是顯而易見的事懺是一種借諸儀式至誠披露的懺悔如說往昔所造諸惡業皆由無始貪瞋癡從身語意之所生今對佛前求懺悔見華嚴經這在佛教各種懺法的形式上表現得非常突出所以以金剛經為依據的懺儀就是把金剛經的般若思想納入懺儀之中也就是把理懺和事懺結合起來融為一體從而更全面徹底地懺悔過去所造的罪障顯示自性本具的圓滿清淨與自在本文獻以簡單的禮懺方式出現據敦煌遺書抄寫本文獻的形式看它既可以單獨使用又可以和其他懺法合起來使用據傳統的懺法形式來看如果單獨使用的話它也只是懺法的主體部分首尾還得加上其他一些內容如發願廻向等才能構成一個完整的禮懺文然上述十八個本子中沒有一個本子具備這種完整的形式這說明敦煌遺書本金剛五禮大抵屬於備忘錄性質是敦煌僧人自備的參考本而不是懺儀法會的實用文書本文獻對金剛經對古代佛教懺儀以及對金剛經的民眾影響和消業思想的研究均是值得注意的重要資料此外本文獻對研究敦煌寫經的抄寫方式及古代敦煌地區的音韻亦有一定的價值汪娟博士曾對本文獻錄校見前書第頁至第頁此次整理參考了汪娟博士的錄文整理本的底校本情況如下一姚和上金剛五禮一本底本北敦號校本甲本伯號乙本斯號丙本斯號丁本斯號戊本北敦號己本北敦號庚本伯號辛本伯號壬本伯號癸本伯號子本伯號丑本伯號寅本伯號卯本斯號辰本北敦號二金剛五禮底本伯號校本甲本俄號背面錄文一
