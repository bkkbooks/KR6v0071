body:
  text: 一心滿敬禮清淨真如無去無來不生不滅寂然常住湛意恒安千佛共尊十方同敬恒沙功德非色非心南無清淨法身釋迦牟尼佛一心滿敬禮毗盧遮那千葉蓮花四智珍寶德山無極願海無邊積行三祇累功十地廣超法界體滿虛空南無圓滿報身釋迦牟尼佛一心滿敬禮如來生地雪山之北香山之東城號迦衛姓釋迦氏父名淨飯母號摩耶十九出家三十成道南無千百億化身同名釋迦牟尼佛一心滿敬禮金剛般若微妙甚深不可思議生諸佛身滅凡夫罪無人無我聲空色空苦惱蓋纏因茲永寂南無金剛般若波羅蜜多甚深法藏一心滿敬禮舍衛城南須達園中祇陀林下如來精舍眾聖禪房于彼伽藍說斯般若我今恭敬憶念世尊南無金剛般若波羅蜜多甚深法藏錄文完
